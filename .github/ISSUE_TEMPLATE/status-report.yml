name: PM Status Report
description: Auto-generated weekly progress digest (also usable as a pinned status issue).
title: "📊 Status — Week of YYYY-MM-DD"
labels: ["status-report"]
body:
  - type: markdown
    attributes:
      value: |
        This issue is generated by the **PM Agent** or the `pm-report.yml` workflow.
        Update it each week by invoking `@project-manager` with "status report".

  - type: textarea
    id: phase-status
    attributes:
      label: Phase status
      description: >
        Which phases are complete, in progress, or not started.
        Auto-filled by the PM agent.
      placeholder: |
        | Phase | Status | Notes |
        |---|---|---|
        | P0 Foundation | ✅ Complete | |
        | P1 Movement | 🟡 In progress | bunny-hop cap tuning remaining |
        | P2 Multiplayer | ⬜ Not started | |
    validations:
      required: false

  - type: textarea
    id: next-priorities
    attributes:
      label: Next 3 priorities
      placeholder: |
        1. #12 — Fix bunny-hop speed cap regression
        2. #15 — Write movement unit tests for accel curve
        3. #8 — Scaffold ws server session loop
    validations:
      required: false

  - type: textarea
    id: blockers
    attributes:
      label: Blockers & open design questions
      placeholder: |
        - #9 [Design] Wolf behavior during drive phase — needs creator decision
    validations:
      required: false
