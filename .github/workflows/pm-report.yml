name: PM Progress Report

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      post_as_comment:
        description: 'Post report as a comment on the pinned status issue?'
        type: boolean
        default: true

jobs:
  report:
    name: Generate progress digest
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Summarize open issues by phase
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            // Group by phase label
            const phases = {};
            for (const issue of issues) {
              const phaseLabel = issue.labels.find(l => l.name.startsWith('phase:'));
              const phase = phaseLabel ? phaseLabel.name : 'unlabeled';
              if (!phases[phase]) phases[phase] = [];
              phases[phase].push(issue);
            }

            // Build report markdown
            const now = new Date().toISOString().slice(0, 10);
            let body = `## 📊 PM Progress Digest — ${now}\n\n`;
            body += `_Auto-generated by the \`pm-report\` workflow. Invoke \`@project-manager\` for a full status analysis._\n\n`;

            body += `### Open issues by phase\n\n`;
            const sortedPhases = Object.keys(phases).sort();
            for (const phase of sortedPhases) {
              body += `**${phase}** (${phases[phase].length} open)\n`;
              for (const issue of phases[phase].slice(0, 5)) {
                const agent = issue.labels.find(l =>
                  ['agent:coder','agent:test-writer','agent:reviewer','agent:level-designer'].includes(l.name)
                );
                const agentTag = agent ? ` \`${agent.name}\`` : '';
                body += `- #${issue.number} ${issue.title}${agentTag}\n`;
              }
              if (phases[phase].length > 5) {
                body += `- _(+${phases[phase].length - 5} more)_\n`;
              }
              body += '\n';
            }

            body += `### CI status\n`;
            body += `Typecheck and tests ran as part of this workflow — see the [Actions run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for results.\n\n`;
            body += `---\n_Next automated report: next Monday 09:00 UTC_\n`;

            // Output to step summary
            await core.summary.addRaw(body).write();

            // Optionally post as a new issue comment on the most recent status-report issue
            if (context.eventName === 'workflow_dispatch' &&
                context.payload.inputs?.post_as_comment === 'true') {

              const { data: statusIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'status-report',
                state: 'open',
                per_page: 1,
              });

              if (statusIssues.length > 0) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: statusIssues[0].number,
                  body,
                });
                console.log(`Posted report to issue #${statusIssues[0].number}`);
              } else {
                console.log('No open status-report issue found — report written to step summary only.');
              }
            }
